services:
  seed:
    build:
      context: ../
      dockerfile: docker-simple/Dockerfile.simple
    ports:
      - "1600:1600"
    environment:
      - CLUSTER_IP=seed
      - CLUSTER_PORT=1600
      - SEED_PORT_1600_TCP_ADDR=seed
    restart: on-failure


  acu1:
    build:
      context: ../
      dockerfile: docker-simple/Dockerfile.acu
    environment:
      - ZONES=Kitchen
      - CLUSTER_IP=acu1
      - CLUSTER_PORT=2552
      - SEED_PORT_1600_TCP_ADDR=seed
    restart: on-failure

  sensor1:
    build:
      context: ../
      dockerfile: docker-simple/Dockerfile.sensor
    environment:
      - ZONE=Kitchen
      - KIND=Motion
      - CLUSTER_IP=sensor1
      - CLUSTER_PORT=2553
      - SEED_PORT_1600_TCP_ADDR=seed
    restart: on-failure


  keypad1:
    build:
      context: ../
      dockerfile: docker-simple/Dockerfile.keypad
    environment:
      - ZONE=Kitchen
      - CLUSTER_IP=keypad1
      - CLUSTER_PORT=2557
      - SEED_PORT_1600_TCP_ADDR=seed
    restart: on-failure
