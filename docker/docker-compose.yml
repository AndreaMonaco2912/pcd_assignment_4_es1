services:
  seed:
    build:
      context: ../
      dockerfile: docker/Dockerfile.simple
    ports:
      - "1600:1600"
    environment:
      - CLUSTER_IP=seed
      - CLUSTER_PORT=1600
      - SEED_PORT_1600_TCP_ADDR=seed

  acu1:
    build:
      context: ../
      dockerfile: docker/Dockerfile.acu
    environment:
      - ZONES=kitchen,garage
      - CLUSTER_IP=acu1
      - CLUSTER_PORT=2552
      - SEED_PORT_1600_TCP_ADDR=seed


  sensor1:
    build:
      context: ../
      dockerfile: docker/Dockerfile.sensor
    environment:
      - ZONE=kitchen
      - CLUSTER_IP=sensor1
      - CLUSTER_PORT=2553
      - SEED_PORT_1600_TCP_ADDR=seed


  sensor2:
    build:
      context: ../
      dockerfile: docker/Dockerfile.sensor
    environment:
      - ZONE=garage
      - CLUSTER_IP=sensor2
      - CLUSTER_PORT=2554
      - SEED_PORT_1600_TCP_ADDR=seed